name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Show files
        run: find . -maxdepth 4 -type f | sort

      - name: Build debug APK
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace --info 2>&1 | tee gradle-build.log

      - name: Show useful Gradle errors
        if: always()
        run: |
          echo "---- What went wrong ----"
          grep -n -A 40 -E "What went wrong:|FAILURE: Build failed with an exception.|Caused by:" gradle-build.log || true

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
